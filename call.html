<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StreamJav - Invitado</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #181a1f;
    color: #eee;
    font-family: sans-serif;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  input[type="text"], select {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #222;
    color: #eee;
  }
  input:disabled {
    background: #333;
    color: #999;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  #joinBtn {
    background: #2ddc86;
    color: #fff;
  }
  button:disabled {
    opacity: 0.6;
  }
  .status {
    margin-top: 12px;
    font-size: 14px;
  }
  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-left: 6px;
    border-radius: 50%;
    background: #2ddc86;
  }
  video {
    width: 100%;
    max-height: 200px;
    margin-top: 12px;
    border: 1px solid #555;
    background: #000;
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="titleHeading">Bienvenido Invitado</h1>
  <div class="status">Listo para configurar <span class="dot"></span></div>
  
  <label for="room">Sala</label>
  <input id="room" type="text" disabled>

  <label for="mediaType">Fuente de video</label>
  <select id="mediaType">
    <option value="user">Cámara frontal</option>
    <option value="environment">Cámara trasera</option>
  </select>

  <button id="joinBtn" disabled>COMENZAR</button>

  <video id="localPreview" autoplay playsinline muted></video>
  <div id="iframeContainer"></div>
</div>

<script>
// Referencias a elementos DOM
const roomInput = document.getElementById('room');
const mediaTypeSelect = document.getElementById('mediaType');
const joinBtn = document.getElementById('joinBtn');
const localPreview = document.getElementById('localPreview');
const iframeContainer = document.getElementById('iframeContainer');
const titleHeading = document.getElementById('titleHeading');

// Leer parámetros de la URL (p.ej. ?slot=INV1&room=NombreSala)
const params = new URLSearchParams(window.location.search);
const slotParam = params.get('slot');
const roomParam = params.get('room');

// Actualizar título con número de invitado
if (slotParam) {
    const num = slotParam.replace(/[^0-9]/g, '');
    if (num) {
        titleHeading.textContent = 'Bienvenido Invitado ' + num;
    }
}
// Establecer y mostrar la sala (solo lectura)
if (roomParam) {
    roomInput.value = roomParam;
} else {
    roomInput.value = 'PROINKASWITHC';
}

// Mostrar previsualización local de video
let currentStream = null;
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    currentStream = stream;
    localPreview.srcObject = stream;
    // Habilitar botón COMENZAR cuando la cámara esté lista
    joinBtn.disabled = false;
  })
  .catch(() => {
    alert('No se pudo acceder a la cámara');
});

// Actualizar mensaje de estado
function updateStatus(msg, color = '#eee') {
  const statusEl = document.querySelector('.status');
  statusEl.firstChild.textContent = msg;
  statusEl.querySelector('.dot').style.background = color;
}

// Construir la URL de VDO.Ninja con parámetros
function buildRoomURL() {
  const url = new URL('https://vdo.ninja/');
  url.searchParams.set('room', roomInput.value.trim());
  if (slotParam) {
    url.searchParams.set('push', slotParam);
    // Nombre visible (Invitado X)
    const name = 'Invitado ' + (slotParam.replace(/[^0-9]/g, '') || '');
    url.searchParams.set('name', name);
  }
  url.searchParams.set('autostart', '');
  url.searchParams.set('webcam', '');
  url.searchParams.set('cleanoutput', '');
  return url;
}

// Iniciar el stream de audio/video y crear el iframe
async function startStream() {
  const mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localPreview.srcObject = mediaStream;
  const url = buildRoomURL();
  iframeContainer.innerHTML = `<iframe allow="microphone; camera" id="vdoIframe" src="${url}" style="width:100%; height:75vh;"></iframe>`;
}

joinBtn.addEventListener('click', async () => {
  updateStatus('Entrando a sala...', '#2ddc86');
  await startStream();
  updateStatus('Conectado', '#2ddc86');
});
</script>
</body>
</html>
