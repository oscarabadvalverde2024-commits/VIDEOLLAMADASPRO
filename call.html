<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamJav</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:#121826;
  --text:#eaf2ff;
  --muted:#7f96c2;
  --accent:#2ddc86;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui;}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* UI */
.app{
  width:100%;
  max-width:420px;
  padding:24px;
  text-align:center;
}

h1{
  font-size:20px;
  margin-bottom:6px;
}

.sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:24px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,255,255,.06);
}

/* Video preview */
video{
  width:100%;
  border-radius:14px;
  background:#000;
  margin-bottom:16px;
}

/* Select */
select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1a2235;
  color:white;
  margin-bottom:16px;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.start{
  background:linear-gradient(135deg,#2ddc86,#6affb4);
  color:#052014;
}

/* Fullscreen iframe */
#frame{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  display:none;
  background:black;
}
</style>
</head>

<body>

<div class="app" id="app">
  <h1 id="title">Bienvenido Invitado</h1>
  <div class="sub" id="roomLabel">Sala</div>

  <div class="card">
    <video id="preview" autoplay muted playsinline></video>

    <select id="camera">
      <option value="user">Cámara frontal</option>
      <option value="environment">Cámara trasera</option>
    </select>

    <button class="start" id="start">COMENZAR</button>
  </div>
</div>

<iframe id="frame"
allow="camera *; microphone *; autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "PROINKASWITHC";
const slot = params.get("slot") || "INV1";

const num = slot.match(/\d+/)?.[0] || "1";

document.getElementById("title").textContent = "Bienvenido Invitado " + num;
document.getElementById("roomLabel").textContent = room;

const video = document.getElementById("preview");
const cameraSelect = document.getElementById("camera");
const startBtn = document.getElementById("start");
const frame = document.getElementById("frame");

let stream;

/* CAMARA */
async function startCamera(mode){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: mode },
      audio:true
    });
    video.srcObject = stream;
  }catch(e){
    alert("No se pudo acceder a la cámara");
  }
}

/* CAMBIO CAMARA */
cameraSelect.addEventListener("change", ()=>{
  startCamera(cameraSelect.value);
});

/* ENTRAR */
startBtn.onclick = ()=>{
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }

  const url = new URL("https://vdo.ninja/");
  url.searchParams.set("room", room);
  url.searchParams.set("push", slot);
  url.searchParams.set("autostart", "");
  url.searchParams.set("cleanoutput", "");
  url.searchParams.set("nopreview", "");
  url.searchParams.set("nochat", "");
  url.searchParams.set("nodashboard", "");

  frame.src = url.toString();

  document.getElementById("app").style.display = "none";
  frame.style.display = "block";
};

/* INIT */
startCamera("user");
</script>

</body>
</html>
