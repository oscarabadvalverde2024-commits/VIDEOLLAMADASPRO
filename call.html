<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StreamJav - Invitado</title>
<style>
  body {margin:0; padding:0; background:#181a1f; color:#eee; font-family:sans-serif;}
  .container {max-width: 480px; margin: 0 auto; padding: 20px; text-align:center;}
  h1 {font-size:24px; margin-bottom:20px;}
  label {display:block; text-align:left; font-size:14px; margin-top:10px;}
  input {width:100%; padding:8px; font-size:14px; border:1px solid #444; border-radius:4px;
         background:#222; color:#eee;}
  button {width:100%; margin-top:12px; padding:10px; font-size:16px; border:none; border-radius:4px;
          background:#4ea1ff; color:#fff; cursor:pointer;}
  button:disabled {opacity:0.6;}
  .status {margin-top:12px; font-size:14px;}
  .dot {display:inline-block; width:10px; height:10px; margin-left:6px;
         border-radius:50%; background:#2ddc86;}
  video {width:100%; max-height:200px; margin-top:10px; border:1px solid #444;
         display:none; border-radius:4px; background:#000;}
  #iframeContainer {display:none; position:fixed; inset:0;}
  iframe {width:100%; height:100%; border:none;}
</style>
</head>
<body>
<div class="container">
  <h1>Ingreso Invitado</h1>
  <div class="status">Listo para configurar <span class="dot"></span></div>
  <label for="room">Sala</label>
  <input id="room" value="PROINKASWITCH">
  <label for="slot">Slot</label>
  <input id="slot" value="INV1">
  <label for="name">Nombre</label>
  <input id="name" value="Invitado 1">
  <button id="permissionBtn">Permitir cámara</button>
  <button id="enterBtn">Entrar a la sala</button>
  <button id="copyBtn">Copiar enlace</button>
  <button id="backBtn">Volver</button>
  <video id="localPreview" autoplay muted playsinline></video>
</div>
<div id="iframeContainer">
  <iframe id="vdoFrame"
          allow="camera *;microphone *;fullscreen;display-capture;autoplay"
          allowfullscreen
          referrerpolicy="no-referrer"></iframe>
</div>

<script>
const roomInput = document.getElementById('room');
const slotInput = document.getElementById('slot');
const nameInput = document.getElementById('name');
const permissionBtn = document.getElementById('permissionBtn');
const enterBtn = document.getElementById('enterBtn');
const copyBtn = document.getElementById('copyBtn');
const backBtn = document.getElementById('backBtn');
const localPreview = document.getElementById('localPreview');
const iframeContainer = document.getElementById('iframeContainer');
const vdoFrame = document.getElementById('vdoFrame');
const statusText = document.querySelector('.status');
const dot = document.querySelector('.dot');
let currentStream;

function buildRoomURL() {
    const url = new URL('https://vdo.ninja/');
    url.searchParams.set('room', roomInput.value.trim() || 'PROINKASWITCH');
    url.searchParams.set('push', slotInput.value.trim() || 'INV1');
    url.searchParams.set('name', nameInput.value.trim() || '');
    url.searchParams.set('autostart', '');
    url.searchParams.set('webcam', '');
    url.searchParams.set('cleanoutput', '');
    url.searchParams.set('transparent', '');
    url.searchParams.set('nochat', '');
    url.searchParams.set('nodashboard', '');
    url.searchParams.set('header', 'STREAMJAV');
    url.searchParams.set('btntxt', 'ENTRAR');
    url.searchParams.set('language', 'es');
    return url.toString();
}

function updateStatus(message, color='#2ddc86') {
    statusText.textContent = message;
    dot.style.background = color;
}

async function startPreview() {
    updateStatus('Solicitando permisos...');
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        localPreview.srcObject = null;
    }
    try {
        currentStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        localPreview.srcObject = currentStream;
        localPreview.style.display = 'block';
        updateStatus('Permiso concedido', '#2ddc86');
    } catch (err) {
        console.error(err);
        updateStatus('No se pudo acceder a la cámara', '#ff5d6c');
    }
}

permissionBtn.addEventListener('click', startPreview);
enterBtn.addEventListener('click', () => {
    const url = buildRoomURL();
    vdoFrame.src = url;
    iframeContainer.style.display = 'block';
    updateStatus('Conectando a la sala...', '#4ea1ff');
});
copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(buildRoomURL());
    updateStatus('Enlace copiado');
});
backBtn.addEventListener('click', () => {
    iframeContainer.style.display = 'none';
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
        localPreview.srcObject = null;
    }
    updateStatus('Listo para configurar', '#2ddc86');
});
</script>
</body>
</html>
