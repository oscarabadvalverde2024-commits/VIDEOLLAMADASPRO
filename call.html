<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invitado - Videollamada</title>
</head>
<body style="margin:0; background:#000;">
<script>
  // Extraer parámetros de la URL
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room') || 'ROOM';
  const slot = params.get('slot') || 'INV';
  // Crear iframe de VDO.Ninja con permisos de cámara y micrófono
  const iframe = document.createElement('iframe');
  iframe.allow = "camera *; microphone *; fullscreen; display-capture; autoplay";
  // Fuente con parámetros: el invitado publica con ID=slot en la sala indicada
  iframe.src = "https://vdo.ninja/?push=" + encodeURIComponent(slot) 
             + "&room=" + encodeURIComponent(room)
             + "&webcam&autostart&cleanoutput&facing=front";
  // Estilos para full-screen
  Object.assign(iframe.style, {
    position: 'fixed', top: 0, left: 0,
    width: '100%', height: '100%', border: 'none'
  });
  document.body.appendChild(iframe);
</script>
</body>
</html>
