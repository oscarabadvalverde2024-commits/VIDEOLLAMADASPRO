<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamJav | Conexión de Invitado</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #3b82f6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .main-container {
            width: 90%; max-width: 400px;
            background: var(--card);
            padding: 30px; border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            position: relative; z-index: 10;
        }

        h1 { font-size: 20px; margin: 0 0 5px 0; font-weight: 600; }
        .room-label { color: var(--accent); font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; display: block; }

        .preview-box {
            width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 16px;
            margin-bottom: 20px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .control-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }

        select {
            width: 100%; padding: 14px;
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 12px; color: #fff; font-size: 15px;
            outline: none; appearance: none;
        }

        .btn-start {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none; border-radius: 14px;
            color: white; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }

        .btn-start:disabled { background: #30363d; color: #94a3b8; }

        #vdo-frame {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: none; background: #000; 
            z-index: 1; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="main-container" id="setup-ui">
    <h1 id="user-title">Bienvenido</h1>
    <span class="room-label" id="room-name">Videollamada</span>

    <div class="preview-box">
        <video id="local-preview" autoplay muted playsinline></video>
    </div>

    <div class="control-group">
        <label>Seleccionar Cámara</label>
        <select id="cam-select"></select>
    </div>

    <button class="btn-start" id="btn-start" onclick="iniciarStream()">COMENZAR TRANSMISIÓN</button>
</div>

<iframe id="vdo-frame" allow="camera *; microphone *; autoplay *; display-capture *; fullscreen"></iframe>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room') || 'SALA_PRO';
    const push = urlParams.get('push') || 'ID_INVITADO';
    const name = urlParams.get('name') || 'Invitado';

    document.getElementById('user-title').innerText = `Hola, ${name}`;
    document.getElementById('room-name').innerText = `SALA: ${room}`;

    const camSelect = document.getElementById('cam-select');
    const preview = document.getElementById('local-preview');
    const btnStart = document.getElementById('btn-start');
    let currentStream = null;

    function traducirNombre(label, index) {
        let l = label.toLowerCase();
        if (l.includes('back') || l.includes('trasera') || l.includes('environment')) return "Cámara Trasera";
        if (l.includes('front') || l.includes('frontal') || l.includes('user')) return "Cámara Frontal";
        return `Cámara ${index + 1}`;
    }

    async function cargarDispositivos() {
        try {
            const temp = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            temp.getTracks().forEach(t => t.stop());
            
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            camSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = traducirNombre(device.label, index);
                camSelect.appendChild(option);
            });
            actualizarPreview();
        } catch (e) { alert("Acceso a cámara denegado."); }
    }

    async function actualizarPreview() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
        try {
            // Intentamos abrir la cámara específica seleccionada
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: camSelect.value } },
                audio: true
            });
            preview.srcObject = currentStream;
        } catch (e) {
            // Si falla el acceso exacto (común en algunos móviles), pedimos cualquier cámara
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            preview.srcObject = currentStream;
        }
    }

    camSelect.onchange = actualizarPreview;

    function iniciarStream() {
        let facing = "front";
        const txt = camSelect.options[camSelect.selectedIndex].text.toLowerCase();
        if (txt.includes('trasera')) facing = "back";

        // Detenemos la cámara local para que el Iframe pueda tomarla
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            preview.srcObject = null;
        }

        btnStart.innerText = "CONECTANDO...";
        btnStart.disabled = true;

        // Construcción de la URL optimizada para móviles
        const ninjaUrl = `https://vdo.ninja/?room=${room}&push=${push}&label=${encodeURIComponent(name)}&autostart=1&webcam=1&facing=${facing}&clean=1&nochat=1`;
        
        const frame = document.getElementById('vdo-frame');
        frame.src = ninjaUrl;

        // Tiempo de espera para que el hardware se libere antes de mostrar el video final
        setTimeout(() => {
            document.getElementById('setup-ui').style.display = "none";
            frame.style.opacity = "1";
            frame.style.zIndex = "9999";
        }, 1200);
    }

    cargarDispositivos();
</script>

</body>
</html>
