<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamJav - Invitado</title>

<style>
body {
  margin:0;
  background:#000;
  font-family:Arial, sans-serif;
}

#ui {
  position:fixed;
  inset:0;
  background:#0b0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

.topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50px;
  background:#111;
  display:flex;
  align-items:center;
  padding:0 15px;
  font-weight:bold;
  z-index:10;
}

#frame {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  display:none;
}

.status {
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="topbar">STREAMJAV • INVITADO</div>

<div id="ui">
  <h2>Entrar a la videollamada</h2>
  <button onclick="entrar()">ENTRAR</button>
  <div class="status" id="status">Listo</div>
</div>

<iframe id="frame" allow="camera *; microphone *; fullscreen; autoplay"></iframe>

<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "SALA1";
const slot = params.get("slot") || "INV1";
const name = params.get("name") || "INVITADO";

function buildURL(){
  return `https://vdo.ninja/?room=${room}&push=${slot}&autostart&webcam&cleanoutput&nochat&nodashboard&mute&transparent&minimal&name=${name}`;
}

function entrar(){
  document.getElementById("status").innerText = "Conectando...";
  
  const iframe = document.getElementById("frame");
  iframe.src = buildURL();
  
  iframe.style.display = "block";
  document.getElementById("ui").style.display = "none";
}
</script>

</body>
</html>
