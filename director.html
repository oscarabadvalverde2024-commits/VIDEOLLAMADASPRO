<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamJav Director | Control de Video</title>

<style>
  :root {
    --bg: #07111f;
    --blue: #4ea1ff;
    --green: #2ddc86;
    --text: #eef4ff;
  }
  
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }
  
  iframe {
    position: fixed;
    top: 48px; /* Bajamos el iframe para que no lo tape la barra */
    left: 0;
    width: 100%;
    height: calc(100% - 48px);
    border: none;
    z-index: 1;
  }

  .streamjav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    height: 48px;
    width: 100%;
    background: #07111f;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .logo-mini {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    color: #03111d;
    display: grid; place-items: center;
    font-weight: 900; font-size: 14px;
  }

  .brand-name {
    color: var(--text);
    font-size: 14px;
    font-weight: 800;
  }

  .room-info {
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(45, 220, 134, 0.1);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
  }
</style>
</head>

<body>

<div class="streamjav-overlay">
  <div class="logo-mini">S</div>
  <div class="brand-name">STREAMJAV STUDIO</div>
  <div class="room-info" id="room-display">SALA: —</div>
</div>

<iframe id="frame" allow="camera; microphone; display-capture; autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "PROINKASWITCH";
const push = params.get("push") || "2dj5BAw";
const name = params.get("name") || "vMix Video";
const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";

document.getElementById("room-display").textContent = `SALA: ${room}`;

const audioFormatted = audio.replaceAll(" ", "*");

/**
 * PARÁMETROS DE LIMPIEZA TOTAL:
 * &clean=1: Elimina la mayoría de textos y botones de ayuda.
 * &hidelinks=1: Quita específicamente lo que marcaste en naranja.
 * &noheader=1: Elimina el encabezado gris de VDO.Ninja.
 */
const url = `https://vdo.ninja/?director=${room}` +
            `&vlabel=${encodeURIComponent(name)}` +
            `&alabel=${audioFormatted}` +
            `&push=${push}` +
            `&autoplay=1` +
            `&autostart=1` +
            `&lang=es` +
            `&webcam=1` +
            `&vd=vMix` +
            `&ad=Line` +
            `&hidelinks=1` + 
            `&clean=1` + 
            `&noheader=1`;

document.getElementById("frame").src = url;
</script>

</body>
</html>
