<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamJav Director | Control Room</title>
  <style>
    :root {
      --bg: #07111f;
      --header-h: 70px;
      --blue: #4ea1ff;
      --green: #2ddc86;
    }
    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Header estilo Index */
    .topbar {
      height: var(--header-h);
      background: rgba(8, 13, 23, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 35px; height: 35px; border-radius: 10px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #03111d; font-weight: 900; font-size: 18px;
    }
    .brand-info h1 { color: #fff; margin: 0; font-size: 16px; letter-spacing: 1px; }
    .brand-info p { color: #a4b7d5; margin: 0; font-size: 11px; text-transform: uppercase; opacity: 0.8; }
    
    .room-badge {
      background: rgba(45, 220, 134, 0.1);
      border: 1px solid rgba(45, 220, 134, 0.3);
      color: #2ddc86;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    /* Contenedor del Iframe */
    .view-container {
      flex: 1;
      position: relative;
      background: #000;
    }
    iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo">S</div>
      <div class="brand-info">
        <h1>STREAMJAV DIRECTOR</h1>
        <p id="director-label">Iniciando sesión...</p>
      </div>
    </div>
    <div class="room-badge" id="room-display">SALA: --</div>
  </header>

  <main class="view-container">
    <iframe id="frame" allow="camera; microphone; display-capture; autoplay; fullscreen"></iframe>
  </main>

  <script>
    const params = new URLSearchParams(location.search);

    const room = params.get("room") || "PROINKASWITCH";
    const push = params.get("push") || "2dj5BAw";
    const name = params.get("name") || "vMix Video";
    const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";

    // Actualizar UI del wrapper
    document.getElementById("room-display").textContent = `SALA: ${room}`;
    document.getElementById("director-label").textContent = `DIRECTOR: ${name}`;

    const audioFormatted = audio.replaceAll(" ", "*");

    // URL optimizada: &clean=1 y &noheader=1 eliminan la UI de Ninja para que brille la tuya
    // &transparent=1 por si quieres hacer chroma en vMix sobre el director
    const url = `https://vdo.ninja/?director=${room}&vlabel=${name.replaceAll(" ","*")}&alabel=${audioFormatted}&push=${push}&autoplay=1&autostart=1&directorstfu=1&webcam=1&vd=vMix&ad=Line&clean=1&noheader=1`;

    document.getElementById("frame").src = url;
  </script>

</body>
</html>
