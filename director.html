<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "PROINKASWITCH";
const push = params.get("push") || "2dj5BAw";
const name = params.get("name") || "vMix Video";
const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";

const uiTitle = document.getElementById("uiTitle");
const uiSub = document.getElementById("uiSub");
const uiStatus = document.getElementById("uiStatus");
const frame = document.getElementById("frame");
const loading = document.getElementById("loading");

uiTitle.textContent = `Director • ${room}`;
uiSub.textContent = `${name} / ${audio}`;
uiStatus.textContent = "Solicitando permisos...";

function toVdoLabel(value) {
  return String(value || "").trim().replaceAll(" ", "*");
}

function buildUrl() {
  const vlabel = toVdoLabel(name);
  const alabel = toVdoLabel(audio);

  return `https://vdo.ninja/?director=${encodeURIComponent(room)}&vlabel=${encodeURIComponent(vlabel)}&alabel=${encodeURIComponent(alabel)}&push=${encodeURIComponent(push)}&autoplay=1&autostart=1&directorstfu=1&webcam=1&cleanoutput&transparent&nochat&nodashboard`;
}

// 🔥 FUNCIÓN CLAVE
async function iniciar() {
  try {
    // 👇 AQUÍ FORZAMOS PERMISOS EN TU DOMINIO
    await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    uiStatus.textContent = "Cargando transmisión...";
    
    // ahora sí cargamos el iframe
    frame.src = buildUrl();

  } catch (err) {
    console.error(err);
    uiStatus.textContent = "Permisos bloqueados ❌";
    alert("Debes permitir cámara y micrófono para continuar.");
  }
}

// cuando cargue iframe
frame.addEventListener("load", () => {
  loading.style.display = "none";
  frame.style.opacity = "1";
  uiStatus.textContent = "Sala lista";
});

// iniciar automáticamente
iniciar();
</script>
