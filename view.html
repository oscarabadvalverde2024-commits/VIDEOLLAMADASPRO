<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamJav | View</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        iframe { border: none; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <iframe id="ninja-view" allow="autoplay; fullscreen"></iframe>

    <script>
        // Capturar parámetros de la URL de GitHub
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room') || 'SALA_PRO';
        const view = urlParams.get('view') || '';

        // Construir la URL real de VDO.Ninja
        // Usamos cleanoutput=1 para que vMix reciba la señal pura
        if (view) {
            const vdoUrl = `https://vdo.ninja/?view=${view}&room=${room}&scene=1&autoplay=1&cleanoutput=1&transparent=1`;
            document.getElementById('ninja-view').src = vdoUrl;
        } else {
            document.body.innerHTML = "<div style='color:white;text-align:center;padding-top:20%;font-family:sans-serif;'>ERROR: Falta ID de invitado (view)</div>";
        }
    </script>
</body>
</html>
