<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StreamJav HUB</title>

<style>
body {
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
}

input {
  padding:10px;
  font-size:16px;
  margin:5px;
}

button {
  padding:12px 20px;
  margin:5px;
  border:none;
  background:#2979ff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>STREAMJAV HUB</h1>

  <input id="room" placeholder="Sala" value="PROINKASWITCH"><br>
  <input id="name" placeholder="Nombre" value="INVITADO1"><br>

  <button onclick="inv()">Entrar como Invitado</button>
  <button onclick="dir()">Entrar como Director</button>
</div>

<script>
function inv(){
  const room = document.getElementById("room").value;
  const name = document.getElementById("name").value;
  location.href = `call.html?room=${room}&slot=INV1&name=${name}`;
}

function dir(){
  const room = document.getElementById("room").value;
  location.href = `director.html?room=${room}`;
}
</script>

</body>
</html>
