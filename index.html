<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIDEOLLAMADAS PRO</title>

<style>
body {
    margin:0;
    background:#0b0e14;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2 {
    margin-top:20px;
}

#video {
    width:100%;
    max-width:800px;
    height:auto;
    background:black;
    border-radius:12px;
    margin-top:20px;
}

.controls {
    margin-top:20px;
}

select, button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button {
    background:#22c55e;
    color:black;
    font-weight:bold;
}

button:hover {
    background:#16a34a;
}

</style>
</head>

<body>

<h2>🎥 SALA EN VIVO</h2>

<video id="video" autoplay playsinline muted></video>

<div class="controls">
    <select id="cameraSelect"></select>
    <br>
    <button onclick="startStream()">🚀 INICIAR TRANSMISIÓN</button>
</div>

<script>

let localStream;

// 🔥 INICIALIZAR (PEDIR PERMISOS PRIMERO)
async function init(){
    try{
        // Pedir permisos
        await navigator.mediaDevices.getUserMedia({video:true, audio:true});

        // Obtener cámaras
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === "videoinput");

        const select = document.getElementById("cameraSelect");
        select.innerHTML = "";

        cams.forEach(cam=>{
            let option = document.createElement("option");
            option.value = cam.deviceId;
            option.text = cam.label || "Cámara";
            select.appendChild(option);
        });

    } catch(err){
        alert("⚠️ Debes permitir cámara y micrófono");
        console.error(err);
    }
}

// 🚀 INICIAR STREAM
async function startStream(){
    const deviceId = document.getElementById("cameraSelect").value;

    try{
        localStream = await navigator.mediaDevices.getUserMedia({
            video:{ deviceId: deviceId ? { exact: deviceId } : undefined },
            audio:true
        });

        document.getElementById("video").srcObject = localStream;

        // 🔥 PARAMETROS
        const params = new URLSearchParams(window.location.search);
        const room = params.get("room") || "SALA";
        const slot = params.get("slot") || "INV1";

        // 🔥 VDO NINJA OCULTO
        const iframe = document.createElement("iframe");
        iframe.style.display="none";

        iframe.src = `https://vdo.ninja/?push=${slot}&room=${room}&webcam&autostart&clean`;

        document.body.appendChild(iframe);

    } catch(err){
        alert("❌ Error al iniciar cámara");
        console.error(err);
    }
}

// Ejecutar al cargar
init();

</script>

</body>
</html>
